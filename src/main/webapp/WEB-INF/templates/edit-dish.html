<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout}">
<head>
    <meta charset="UTF-8">
    <title>Chinh sua mon an</title>
</head>
<body>
<section class="panel form-card" layout:fragment="content">
    <h2 class="section-title">Chinh sua mon an</h2>
    <p class="section-subtitle">Cap nhat thong tin mon an trong thuc don.</p>

    <form th:object="${dish}" th:action="@{|/bai4/edit/${dish.id}|}" method="post">
        <div class="form-group">
            <label for="id">ID mon an</label>
            <input id="id" type="number" th:field="*{id}" readonly>
        </div>

        <div class="form-group">
            <label for="name">Ten mon</label>
            <input id="name" type="text" th:field="*{name}" placeholder="Nhap ten mon an">
        </div>

        <div class="form-group">
            <label for="price">Gia mon</label>
            <input id="price" type="number" step="0.01" th:field="*{price}" placeholder="Nhap gia mon an">
        </div>

        <div class="form-group">
            <label for="available">Trang thai</label>
            <select id="available" th:field="*{available}">
                <option th:value="true">Con hang</option>
                <option th:value="false">Het hang</option>
            </select>
        </div>

        <div class="actions">
            <button class="btn btn-primary" type="submit">Luu thay doi</button>
            <a class="btn btn-secondary" th:href="@{/bai4/dishes}">Quay lai danh sach</a>
        </div>
    </form>
</section>
</body>
</html>
